services:
  airflow:
    image: apache/airflow:2.6.3
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW_HOME=/opt/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./extract.py:/opt/airflow/extract.py
      - ./weather_dbt:/opt/airflow/weather_dbt
      - ./.env:/opt/airflow/.env
      - ./snowflake_key.p8:/opt/airflow/snowflake_key.p8
    ports:
      - "8080:8080"
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin --firstname Tejaswi --lastname K --role Admin --email ktejaswireddy25@gmail.com &&
               airflow webserver & airflow scheduler"